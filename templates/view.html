<h1>Financial Records</h1>
<h2>Records</h2>

<a href="/add">Add New Record</a>

<table border="1">
<tr>
    <th>Date</th>
    <th>Type</th>
    <th>Category</th>
    <th>Item</th>
    <th>Amount</th>
</tr>

{% for r in records %}
<tr>
    <td>{{ r.date }}</td>
    <td>{{ r.type }}</td>
    <td>{{ r.category }}</td>
    <td>{{ r.item }}</td>
    <td>{{ r.amount }}</td>
</tr>
{% endfor %}
</table>
