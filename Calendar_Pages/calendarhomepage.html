<!DOCTYPE html>
<html>
<head>
    <title>Life Pages</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            border-right: 1px solid #ccc;
            padding: 15px;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12px;
            color: gray;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .menu-item {
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        .menu-item:hover {
            background-color: #f0f0f0;
        }

        .active {
            background-color: #e0e0e0;
            font-weight: bold;
        }

        .main {
            flex: 1;
            padding: 25px;   
            background-color:  #f7f7f7;      
        }

        /* ===== Calendar Styles  ===== */
         .calendar {
            margin-top: 20px;
        }
        
         /* Weekday header row */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
        }


         /* Grid container for days */
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }   
        
        /* Empty cells for alignment + day cells */
        .day, .empty {
            border: 1.5px solid #ddd;
            border-radius: 10px;
            min-height: 120px;
            padding: 8px;
            background-color: #fff;
        }

         /* Each day cell layout */
        .day {
            display: flex;
            flex-direction: column;
        }

         /* Date number (top-left) */
        .date {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

         /* Highlight today's date */
        .today {
            background-color: #e3f2fd;
        }

        .calendar-header {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 15px;
        }

        .calendar-header button {
           padding: 5px 10px;
           font-size: 16px;
           cursor: pointer;
           border: none;
           background-color: #eee;
           border-radius: 6px;
        }

          .calendar-header button:hover {
            background-color: #ddd;
        }

        /* ===== Top Bar Layout ===== */
        .calendar-top {
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        /* ===== View Buttons ===== */
        .view-buttons button {
          margin-left: 8px;
          padding: 5px 10px;
          border: none;
          background-color: #eee;
          border-radius: 6px;
          cursor: pointer;
        }

        .view-buttons button:hover {
           background-color: #ddd;
        }

        /* ===== YEAR VIEW GRID ===== */
        #yearGrid {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 30px;
          margin-top: 20px;
        }

         /* ===== 每个月的盒子 ===== */
        .month-box {
          border: 1px solid #ccc;
          border-radius: 12px;
          padding: 15px;
          background: white;
          cursor: pointer;
          transition: 0.2s;
        }

        .month-box:hover {
         background: #f5f5f5;
        }

        /* ===== 月份标题 ===== */
        .month-title {
          font-weight: bold;
          font-size: 16px;
          margin-bottom: 8px;
        }

       /* ===== 星期行 ===== */
       .mini-weekdays {
         display: grid;
         grid-template-columns: repeat(7, 1fr);
         font-size: 11px;
         color: gray;
         text-align: center;
         margin-bottom: 5px;
        }

        /* ===== 日期 grid ===== */
          .mini-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            font-size: 13px;
            gap: 4px;
        }

        /* ===== 每一天 ===== */
        .mini-day {
            text-align: center;
            padding: 5px;
            border-radius: 6px;
        }

        .mini-day:hover {
             background: #e3f2fd;
        }

        /* ===== 空白格 ===== */
        .mini-empty {
            visibility: hidden;
        }

         .year-header {
           display: flex;
           justify-content: center;
           align-items: center;
           gap: 20px;
        }

        .calendar-top {
          position: relative;
        }

        .calendar-header {
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
        }
  
         .view-buttons {
          margin-left: auto;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
          <a href ="dashboard.html">Life Pages</a>
    </div>
        <div class="menu-item">Today</div>

        <div class="section-title">To-Do Lists</div>
        <div class="menu-item">Work Tasks</div>
        <div class="menu-item">Shopping List</div>
        <div class="menu-item">Study Plan</div>
        <div class="menu-item">Personal Notes</div>
        <div class="menu-item">Workout Plan</div>

        <div class="section-title">Calendar</div>
        <div class="menu-item active">Calendar</div>

        <div class="section-title">Special</div>
        <div class="menu-item">Countdown</div>

        <div class="section-title">Others</div>
        <div class="menu-item">Completed</div>
        <div class="menu-item">Trash</div>

    </div>

    <!-- ===== Main Content Area ===== -->
    <div class="main">

    <!-- Top Bar -->
    <div class="calendar-top">

    <div class="calendar-header">
        <button onclick="prevMonth()">❮</button>
        <h2 id="monthTitle"></h2>
        <button onclick="nextMonth()">❯</button>
    </div>

    <div class="view-buttons">
        <button onclick="setView('month')">Month View</button>
        <button onclick="setView('year')">Year View</button>
    </div>

</div>

<!-- Month View -->
<div id="monthView">

    <div class="calendar">

        <div class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>

        <div id="calendarDays" class="days"></div>

    </div>

</div>

<!-- Year View -->
<div id="yearView" style="display:none;">

    <!-- Change Year -->
    <div class="year-header">
        <button onclick="prevYear()">❮</button>
        <h2 id="yearTitle"></h2>
        <button onclick="nextYear()">❯</button>
    </div>

    <div id="yearGrid"></div>

</div>

</div>   
<!-- ===== JavaScript File ===== -->
<script src="calendar.js"></script>

</body>
</html>
