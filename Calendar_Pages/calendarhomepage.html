<!DOCTYPE html>
<html>
<head>
    <title>Life Pages</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            border-right: 1px solid #ccc;
            padding: 15px;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12px;
            color: gray;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .menu-item {
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        .menu-item:hover {
            background-color: #f0f0f0;
        }

        .active {
            background-color: #e0e0e0;
            font-weight: bold;
        }

        .main {
            flex: 1;
            padding: 25px;   
            background-color: #f7f7f7;      
        }

        /* ===== Calendar Styles  ===== */
         .calendar {
            margin-top: 20px;
        }
        
         /* Weekday header row */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
        }


         /* Grid container for days */
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }   
        
        /* Empty cells for alignment + day cells */
        .day, .empty {
            border: 1.5px solid #ddd;
            border-radius: 10px;
            min-height: 120px;
            padding: 8px;
            background-color: #fff;
        }

         /* Each day cell layout */
        .day {
            display: flex;
            flex-direction: column;
        }

         /* Date number (top-left) */
        .date {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

         /* Highlight today's date */
        .today {
            background-color: #e3f2fd;
        }

        .calendar-header {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 15px;
        }

        .calendar-header button {
           padding: 5px 10px;
           font-size: 16px;
           cursor: pointer;
           border: none;
           background-color: #eee;
           border-radius: 6px;
        }

          .calendar-header button:hover {
            background-color: #ddd;
        }

        /* ===== Top Bar Layout ===== */
        .calendar-top {
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        /* ===== View Buttons ===== */
        .view-buttons button {
          margin-left: 8px;
          padding: 5px 10px;
          border: none;
          background-color: #eee;
          border-radius: 6px;
          cursor: pointer;
        }

        .view-buttons button:hover {
           background-color: #ddd;
        }

        #workPage {
          margin-top: 20px;
          width: 100%;
          max-width: 500px;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
          <a href ="dashboard.html">Life Pages</a>
    </div>
        <div class="menu-item">Today</div>

        <div class="section-title">To-Do Lists</div>
     <div class="menu-item" onclick="showPage('workPage')">Work Tasks</div>
     <div class="menu-item">Shopping List</div>
     <div class="menu-item">Study Plan</div>
     <div class="menu-item">Personal Notes</div>
     <div class="menu-item">Workout Plan</div>

        <div class="section-title">Calendar</div>
        <div class="menu-item active" onclick="showCalendar()">Calendar</div>

        <div class="section-title">Special</div>
        <div class="menu-item">Countdown</div>

        <div class="section-title">Others</div>
        <div class="menu-item">Completed</div>
        <div class="menu-item">Trash</div>

    </div>

    <!-- ===== Main Content Area ===== -->
    <div class="main">

    <!--Calendar View -->
   <div id="calendarView">

    <div class="calendar-top">
        <div class="calendar-header">
            <button onclick="prevMonth()">‹</button>
            <h2 id="monthTitle"></h2>
            <button onclick="nextMonth()">›</button>
        </div>

        <div class="view-buttons">
            <button onclick="setView('month')">Month View</button>
            <button onclick="setView('year')">Year View</button>
        </div>
    </div>

    <div class="calendar">

        <div class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>

        <div id="calendarDays" class="days"></div>

    </div>

    <div id="yearView" style="display:none;">
        <h3>Year View (Coming Soon)</h3>
    </div>

</div>

    </div>

    <!-- Task View -->
    <div id="workPage" class="page" style="display:none;">

        <h2>Work Tasks</h2>

        <input id="taskText" placeholder="Enter task">
        <input id="taskDate" type="date">

        <button onclick="addTask('work')">Add</button>

        <h3>Tasks</h3>
        <div id="taskList"></div>

        <h3>Completed</h3>
        <div id="completedList"></div>

        <h3>Trash</h3>
        <div id="trashList"></div>

    </div>

  </div>

</div>   
<!-- ===== JavaScript File ===== -->
<script src="tasks.js"></script> 
<script src="calendar.js"></script>

<script>
function showPage(pageId) {

    // Hide all pages
    let pages = document.querySelectorAll(".page");
    pages.forEach(p => p.style.display = "none");

    // Hide calendar
    let calendar = document.getElementById("calendarView");
    if (calendar) calendar.style.display = "none";

    // Show selected
    if (pageId === "calendar") {
        calendar.style.display = "block";
    } else {
        document.getElementById(pageId).style.display = "block";
    }
}

function showCalendar() {

    // Show calendar
    document.getElementById("calendarView").style.display = "block";

    // Hide all task pages
    let pages = document.querySelectorAll(".page");
    pages.forEach(p => p.style.display = "none");
}

</script>

</body>
</html>
