<!DOCTYPE html>
<html>
<head>
    <title>Life Pages</title>
</head>

<body>

    <!-- Top Navigation -->
    <a href="/login">Login</a> |
    <a href="/register">Sign Up</a>

    <hr>

    <h1>Life Pages</h1>
    <p>Log in to organize every page of your life</p>

    <!-- Login Form -->
    <h3>Log in</h3>

    <form method="POST">
        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

<style>
.input-container {
    position: relative;
    width: 250px;
}

.input-container input {
    width: 100%;
    padding: 8px 35px 8px 8px; /* space for icon */
    box-sizing: border-box;
}

.toggle-eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    user-select: none;
}
</style>


<label>Password:</label><br>

<div class="input-container">
    <input type="password" id="password" name="password">

    <span id="eye" class="toggle-eye" onclick="togglePassword()">
        🙈
    </span>
</div><br>

        <button type="submit">Login</button>
    </form>

    <br>

    <!-- 🔥 ONLY ONE BUTTON EACH -->
    <button type="button" onclick="window.location.href='/forgot'">
        Forgot Password
    </button>

    <br><br>

    <button type="button" onclick="window.location.href='/forgot_username'">
        Forgot Username
    </button>

    <!-- 🔥 ERROR MESSAGE -->
    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <!-- 🔥 SUCCESS MESSAGE -->
    {% if request.args.get("success") %}
    <p style="color:green;">{{ request.args.get("success") }}</p>
    {% endif %}

<script>
function togglePassword() {
    const input = document.getElementById("password");
    const eye = document.getElementById("eye");

    if (input.type === "password") {
        input.type = "text";
        eye.textContent = "🙉";
    } else {
        input.type = "password";
        eye.textContent = "🙈";
    }
}
</script>

</body>
</html>
