<h2>SIGN UP</h2>

<form method="POST">
    Username: <input name="username"><br>
    Password: <input type="password" name="password"><br>
    <p>Password must:</p>
<ul>
    <li>Be at least 8 characters</li>
    <li>Contain at least 1 number</li>
    <li>Contain uppercase letter</li>
    <li>Contain lowercase letter</li>
</ul>

    <!-- Security Question -->
<label>Security Question:</label>
<select name="question" required>
    <option value="">-- Select Security Question --</option>
    <option value="nickname">What is your nickname?</option>
    <option value="birth_city">Where is your birth city?</option>
    <option value="favourite_subject">What is your favourite subject?</option>
    <option value="mother_name">What is your mother's name?</option>
    <option value="best_friend">What is your best friend's name?</option>
</select><br>

    <!-- Answer -->
    <label>Answer:</label>
    <input name="answer" required><br>

    <button type="submit">Register</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if request.args.get("success") %}
<p style="color:green;">{{ request.args.get("success") }}</p>
{% endif %}
