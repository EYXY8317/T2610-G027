<!DOCTYPE html>
<html>
<head>
    <title>Update Record</title>
</head>

<body>

<hr>
<a href="/view">View</a> |
<a href="/add">Add</a> |
<a href="/summary">Summary</a> |
<a href="/logout">Logout</a>
<hr>

<h1>Update Record</h1>

<form method="POST">

    <!-- DATE -->
    <label>Date:</label><br>
    <input type="date" name="date" value="{{ record.date }}" required><br><br>

    <!-- TYPE -->
    <label>Type:</label><br>
    <select name="type" id="typeSelect" required>
        <option value="">-- Select Type --</option>
        <option value="income" {% if record.type=="income" %}selected{% endif %}>Income</option>
        <option value="expense" {% if record.type=="expense" %}selected{% endif %}>Expense</option>
        <option value="saving" {% if record.type=="saving" %}selected{% endif %}>Saving</option>
    </select><br><br>

    <!-- CATEGORY -->
    <label>Category:</label><br>
    <select name="category" id="categorySelect"></select><br><br>

    <!-- ACCOUNT -->
    <label>Account:</label><br>
    <select name="account">
        <option value="">-- Select Account --</option>
        {% for acc in accounts %}
        <option value="{{ acc.name }}"
        {% if record.account == acc.name %}selected{% endif %}>
        {{ acc.name }}
        </option>
        {% endfor %}
    </select><br><br>

    <input type="text" name="new_account" placeholder="Or create new account"><br><br>

    <!-- ITEM -->
    <label>Item:</label><br>
    <input type="text" name="item" value="{{ record.item }}"><br><br>

    <!-- AMOUNT -->
    <label>Amount (RM):</label><br>
    <input type="text" id="amountInput" name="amount" value="{{ record.amount }}" readonly required>

    <br><br>
    <button type="submit">Update</button>

</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}

<script>

// CATEGORY MAP
const categories = {
    income: ["Salary", "Freelance", "Business", "Gift", "Bonus"],
    expense: ["Food", "Transport", "Entertainment", "Rent", "Education", "Travel"],
    saving: ["Savings", "Investment", "Emergency Fund"]
};

// INIT CATEGORY
function loadCategories() {
    const type = document.getElementById("typeSelect").value;
    const categorySelect = document.getElementById("categorySelect");

    categorySelect.innerHTML = '<option value="">-- Select Category --</option>';

    if (categories[type]) {
        categories[type].forEach(cat => {
            const option = document.createElement("option");
            option.value = cat;
            option.textContent = cat;

            if (cat === "{{ record.category }}") {
                option.selected = true;
            }

            categorySelect.appendChild(option);
        });
    }
}

// CHANGE EVENT
document.getElementById("typeSelect").addEventListener("change", loadCategories);

// INIT LOAD
loadCategories();

// TNG INPUT
let value = Math.round(parseFloat("{{ record.amount }}") * 100);

document.addEventListener("keydown", function(e) {
    if (e.key >= "0" && e.key <= "9") {
        value = value * 10 + parseInt(e.key);
    } else if (e.key === "Backspace") {
        value = Math.floor(value / 10);
    }

    document.getElementById("amountInput").value = (value / 100).toFixed(2);
});

</script>

</body>
</html>
