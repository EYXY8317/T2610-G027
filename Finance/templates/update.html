<h2>Update Record</h2>

<form method="POST">

Date: <input name="date" value="{{ record.date }}"><br>
Type: <input name="type" value="{{ record.type }}"><br>
Category: <input name="category" value="{{ record.category }}"><br>
Item: <input name="item" value="{{ record.item }}"><br>
Amount: <input name="amount" value="{{ record.amount }}"><br>

<button type="submit">Update</button>

</form>
