<h2>Update Record</h2>

<form method= "POST">

<label>Date:</label><br>
<input type= "date" name= "date" value= "{{ record.date }}" required>
<br><br>

<label>Type:</label><br>
<select name="type" id="type" required>
    <option value="income" {% if record.type == "income" %}selected{% endif %}>Income</option>
    <option value="expense" {% if record.type == "expense" %}selected{% endif %}>Expense</option>
    <option value="saving" {% if record.type == "saving" %}selected{% endif %}>Saving</option>
</select>
<br><br>

<label>Category:</label><br>
<select name="category" id="category" required>
    <option value="">-- Select Category --</option>
</select>
<br><br>

<label>Item:</label><br>
<input name="item" value="{{ record.item }}">
<br><br>

<label>Amount:</label><br>
RM <input type= "text" name= "amount" inputmode="decimal" value="{{ record.amount }}">
<br><br>

<button type= "submit">Update</button>

</form>

<br>
<a href="/view">Back</a>

<script>
const categories = {
    income: ["Salary", "Freelance", "Business", "Gift", "Bonus"],
    expense: ["Food", "Transport", "Entertainment", "Rent", "Education", "Travel"],
    saving: ["Savings", "Investment", "Emergency Fund"]
};

const typeSelect = document.getElementById("type");
const categorySelect = document.getElementById("category");

// 🔥 get current values from backend
const currentType = "{{ record.type }}";
const currentCategory = "{{ record.category }}";

// function to load categories
function loadCategories(type) {

    categorySelect.innerHTML = '<option value="">-- Select Category --</option>';

    if (!categories[type]) return;

    categories[type].forEach(cat => {
        const option = document.createElement("option");
        option.value = cat.toLowerCase();
        option.textContent = cat;

        // 🔥 restore selected category
        if (cat.toLowerCase() === currentCategory.toLowerCase()) {
            option.selected = true;
        }

        categorySelect.appendChild(option);
    });
}

// 🔥 when type changes → reset category properly
typeSelect.addEventListener("change", function () {
    loadCategories(this.value);
});

// 🔥 ON LOAD (CRITICAL)
window.onload = function () {
    typeSelect.value = currentType;   // restore type
    loadCategories(currentType);      // load categories
};
</script>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}
