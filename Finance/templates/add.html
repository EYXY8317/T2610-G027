<!DOCTYPE html>
<html>
<head>
    <title>Life Pages - Add Record</title>
</head>

<body>

<!-- NAVBAR -->
<hr>
<a href="/view">View</a> |
<a href="/add">Add</a> |
<a href="/summary">Summary</a> |
<a href="/logout">Logout</a>
<hr>

<h1>Add Record</h1>
<p>Logged in as: {{ session.user }}</p>

<hr>

<form method="POST">

    <!-- DATE -->
    <label>Date:</label><br>
    <input type="date" name="date" required><br><br>

    <!-- TYPE -->
    <label>Type:</label><br>
    <select name="type" required>
        <option value="">-- Select Type --</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select><br><br>

    <!-- CATEGORY -->
    <label>Category:</label><br>
    <select name="category">
        <option value="">-- Select Category --</option>
        <option value="food">Food</option>
        <option value="transport">Transport</option>
        <option value="salary">Salary</option>
    </select><br><br>

    <!-- 🔥 ACCOUNT SECTION -->
    <fieldset style="width:300px;">
        <legend><b>Account</b></legend>

        <!-- Existing accounts -->
        <select name="account">
            <option value="">-- Select Account --</option>
            {% for acc in accounts %}
            <option value="{{ acc.name }}">{{ acc.name }}</option>
            {% endfor %}
        </select>

        <br><br>

        <!-- Create new -->
        <input type="text" name="new_account" placeholder="Or create new account">

    </fieldset>

    <br>

    <!-- ITEM -->
    <label>Item:</label><br>
    <input type="text" name="item"><br><br>

    <!-- AMOUNT -->
    <label>Amount (RM):</label><br>
    <input type="text" name="amount" required><br><br>

    <button type="submit">Add</button>

</form>

<!-- MESSAGES -->
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}

<br>

<a href="/view">View Records</a>

</body>
</html>
