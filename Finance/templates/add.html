<!DOCTYPE html>
<html>
<head>
    <title>Add Record</title>
</head>

<body>

<hr>
<a href="/view">Finance</a> |
<a href="/calendar">Calendar</a> |
<a href="/diary">Diary</a> |
<a href="/logout">Logout</a>
<hr>


<hr>
<a href="/view">View</a> |
<a href="/add">Add</a> |
<a href="/summary">Summary</a> |
<hr>

<h1>Add Record</h1>

<form method="POST">

    <!-- DATE -->
    <label>Date:</label><br>
    <input type="date" name="date" required><br><br>

    <!-- TYPE -->
    <label>Type:</label><br>
    <select name="type" id="typeSelect" required>
        <option value="">-- Select Type --</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
        <option value="saving">Saving</option>
    </select><br><br>

    <!-- CATEGORY -->
    <label>Category:</label><br>
    <select name="category" id="categorySelect">
        <option value="">-- Select Category --</option>
    </select><br><br>

    <!-- ACCOUNT -->
    <label>Account:</label><br>
    <select name="account">
        <option value="">-- Select Account --</option>
        {% for acc in accounts %}
        <option value="{{ acc.name }}">{{ acc.name }}</option>
        {% endfor %}
    </select><br><br>

    <input type="text" name="new_account" placeholder="Or create new account"><br><br>

    <!-- ITEM -->
    <label>Item:</label><br>
    <input type="text" name="item"><br><br>

    <!-- AMOUNT -->
    <label>Amount (RM):</label><br>
    <input type="text" id="amountInput" name="amount" value="0.00" readonly required>

    <br><br>
    <button type="submit">Add</button>

</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}

<script>

// CATEGORY MAP
const categories = {
    income: ["Salary", "Freelance", "Business", "Gift", "Bonus"],
    expense: ["Food", "Transport", "Entertainment", "Rent", "Education", "Travel"],
    saving: ["Savings", "Investment", "Emergency Fund"]
};

// UPDATE CATEGORY
document.getElementById("typeSelect").addEventListener("change", function() {
    const type = this.value;
    const categorySelect = document.getElementById("categorySelect");

    categorySelect.innerHTML = '<option value="">-- Select Category --</option>';

    if (categories[type]) {
        categories[type].forEach(cat => {
            const option = document.createElement("option");
            option.value = cat;
            option.textContent = cat;
            categorySelect.appendChild(option);
        });
    }
});

// TNG INPUT
let value = 0;

document.addEventListener("keydown", function(e) {
    if (e.key >= "0" && e.key <= "9") {
        value = value * 10 + parseInt(e.key);
    } else if (e.key === "Backspace") {
        value = Math.floor(value / 10);
    }

    document.getElementById("amountInput").value = (value / 100).toFixed(2);
});

</script>

</body>
</html>
