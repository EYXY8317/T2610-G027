<!DOCTYPE html>
<html>
<head>
    <title>Diary</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<hr>

<a href="/view">Finance</a> |
<a href="/calendar">Calendar</a> |
<a href="/diary">Diary</a> |
<a href="/logout">Logout</a>

<hr>


<h1>Diary</h1>

<!-- Search bar -->
<input type="text" id="searchBox" placeholder="Search diary...">
<button id="searchBtn">Search</button>

<div id="searchResults"></div>

<button id="prevBtn" style="display:none;">↑</button>
<button id="nextBtn" style="display:none;">↓</button>
<span id="resultCount"></span>
<br><br>

<!-- Display today's date -->
<h2 id="dateDisplay" style="display:inline; cursor:pointer;">
    {{ today }}
</h2>
<br><br>

<!-- Topic input -->
<input type="text" id="topic" maxlength="20"
value="{{ entry.topic if entry else '' }}"
placeholder="Enter topic (max 20)"
{{ "readonly" if mode == "view" else "" }}>
<br><br>

<!-- Mood selection -->
<label for="mood">Mood:</label>

<select id="mood" name="mood"
{{ "disabled" if mode == "view" else "" }}>
    <option value="">Select mood</option>
    <option value="Happy" {{ "selected" if entry and entry.mood == "Happy" else "" }}>😊 Happy</option>
    <option value="Sad" {{ "selected" if entry and entry.mood == "Sad" else "" }}>😢 Sad</option>
    <option value="Angry" {{ "selected" if entry and entry.mood == "Angry" else "" }}>😡 Angry</option>
</select>
<br><br>

<!-- Text area for diary entry -->
<div id="canvas">
    <div id="box" contenteditable="{{ 'false' if mode == 'view' else 'true' }}">
        {{ entry.content if entry else '' }}
    </div>
</div>

<input type="file" id="uploadImg">

<!-- Save status message -->
<p id="saveStatus"></p>

<!-- Edit and Delete buttons -->
<button id="editBtn">Edit</button>
<button id="deleteBtn">Delete</button>

<!-- Pass the mode variable to JavaScript -->
 <script>
    let mode = "{{ mode }}";
</script>

<!-- Build JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="{{ url_for('static', filename='canvas.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<div style="display:flex; justify-content:space-between; margin-top:20px;">
    <button id="prevDate">←</button>
    <button id="nextDate">→</button>
</div>

<!-- 3) 显示鼓励句（重点） -->
<p id="msg">{{ entry.quote if entry and entry.quote else "" }}</p>

</body>
</html>
