<!DOCTYPE html>
<html>
<head>
    <title>Diary</title>
</head>
<body>

<h1>Diary</h1>
<h2>Today: {{ current_date }}</h2>

<!-- CREATE (ADD) -->
<form method ="POST">
    <textarea name="content" placeholder="Write your diary..."></textarea>
    <br>
    <button type="submit">Add</button>
</form>

<hr>

<!-- READ (VIEW) -->
{% for entry in entries %}
<!--Loop through all entries-->
<!--Percentage = Jinja2 模板语法（template syntax）-->
    <!--For loop-->
<!--Curly = bracesOutput-->

    <p>{{ entry.content }}</p>
    <!--Display the content of each entry-->

    <!-- DELETE -->
    <form method="POST">
        <input type="hidden" name="delete_id" value="{{ entry.id }}">
        <button type="submit">Delete</button>
    </form>

    <!-- UPDATE -->
    <form method="POST">
        <input type="hidden" name="edit_id" value="{{ entry.id }}">
        <input type="text" name="new_content" placeholder="Edit content">
        <button type="submit">Update</button>
    </form>

    <hr>

{% endfor %}
</body>
</html>
