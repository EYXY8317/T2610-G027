<!DOCTYPE html>
<html>
<head>
    <title>Diary</title>
</head>
<body>

<!-- TITLE SECTION 标题部分 ========================================================== -->
<h1>Diary</h1>
<h2>Today: {{ current_date }}</h2>

<!-- CREATE / EDIT SECTION 创建 + 编辑 ========================================================== -->
<textarea 
id="diaryBox" name="content" {{ '' if not latest else 'readonly' }}>
{{ latest }}
</textarea>
<!--
1. empty → editable, has data → readonly
2. (id="diaryBox") = used by JS 
3. if empty → ""
4. if has data → "readonly"
5. latest = display content
    -->

<br><br>

<button id="editBtn">Edit</button>

<!-- MOOD SECTION 情绪选择 ========================================================== -->
<label>Mood:</label>
<br>

<select name="mood" multiple>
    <option value="happy">Happy</option>
    <option value="calm">Calm</option>
    <option value="confused">Confused</option>
    <option value="bored">Bored</option>
    <option value="sad">Sad</option>
    <option value="angry">Angry</option>
    <option value="stress">Stress</option>
    <option value="anxious">Anxious</option>
</select>

<br><br>

<hr>

<!-- READ SECTION 查看全部日记 ========================================================== -->
{% for entry in entries %}
<!--
1. loop through all entries
2. percentage = Jinja2 模板语法（template syntax
3. for loop Curly = bracesOutput
-->

<!-- DELETE SECTION 删除 ========================================================== -->
    <form method="POST">
        <input type="hidden" name="delete_id" value="{{ entry.id }}">
        <button type="submit">Delete</button>
    </form>

    <hr>

{% endfor %}

<!-- JS SCRIPT ========================================================== -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
