<!DOCTYPE html>
<html>
<head>
    <title>Diary</title>
</head>
<body>

<h1>Diary</h1>
<h2>Today: {{ current_date }}</h2>

<!-- CREATE (ADD) -->
<textarea id="diaryBox" name="content">{{ latest }}</textarea>    <br>
<br><br>

<!--Mood-->
<label>Mood:</label>
<br>

<select name="mood" multiple>
    <option value="happy">Happy</option>
    <option value="calm">Calm</option>
    <option value="confused">Confused</option>
    <option value="bored">Bored</option>
    <option value="sad">Sad</option>
    <option value="angry">Angry</option>
    <option value="stress">Stress</option>
    <option value="anxious">Anxious</option>
</select>

    <br><br>

<hr>

<!-- READ (VIEW) -->
{% for entry in entries %}
<!--Loop through all entries-->
<!--Percentage = Jinja2 模板语法（template syntax）-->
    <!--For loop-->
<!--Curly = bracesOutput-->

<p>{{ entry.content }}</p>
<!--Display the content of each entry-->

<!--Moods -->
<p>
    Mood: {{ entry.mood | join(' | ') }}
</p>

    <!-- DELETE -->
    <form method="POST">
        <input type="hidden" name="delete_id" value="{{ entry.id }}">
        <button type="submit">Delete</button>
    </form>

    <!-- UPDATE -->
    <form method="POST">
        <input type="hidden" name="edit_id" value="{{ entry.id }}">
        <input type="text" name="new_content" placeholder="Edit content">
        <button type="submit">Update</button>
    </form>

    <hr>

{% endfor %}

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
